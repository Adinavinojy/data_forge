<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataForge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo-ring {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid #0d4f4f;
      border-top-color: #14b8a6;
      animation: spin 1s linear infinite;
      margin-bottom: 28px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #f0f6fc;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 12px;
      color: #6e7681;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .status {
      font-size: 12px;
      color: #3d9970;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #14b8a6;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="logo-ring"></div>
  <h1>DataForge</h1>
  <p class="subtitle">Automated Data Preprocessing System</p>
  <p class="status">
    <span class="dot"></span>
    Initialising services...
  </p>
</body>
</html>
