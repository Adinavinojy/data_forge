version: '3.8'

services:
  backend:
    build: ./backend
    container_name: dataforge-backend
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: dataforge-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  data:
